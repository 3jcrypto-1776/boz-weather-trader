## Homelab deployment — pulls pre-built images from GHCR.
## Used on Proxmox node 1 (10.0.0.51) with Watchtower for auto-updates.
##
## Usage:
##   docker compose -f docker-compose.homelab.yml up -d
##
## Images are built by GitHub Actions on every push to master.

name: boz-weather-trader

services:
  # ─── PostgreSQL Database ───
  postgres:
    image: postgres:16
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
    labels:
      - "com.centurylinklabs.watchtower.scope=boz-weather-trader"
    environment:
      POSTGRES_USER: boz
      POSTGRES_PASSWORD: boz
      POSTGRES_DB: boz_weather_trader
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Cache + Celery Broker) ───
  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───
  backend:
    image: ghcr.io/aclarkson2013/boz-weather-trader-backend:latest
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
    labels:
      - "com.centurylinklabs.watchtower.scope=boz-weather-trader"
    ports:
      - "8000:8000"
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Celery Worker (processes tasks) ───
  celery-worker:
    image: ghcr.io/aclarkson2013/boz-weather-trader-backend:latest
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
    labels:
      - "com.centurylinklabs.watchtower.scope=boz-weather-trader"
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: []
    command: celery -A backend.celery_app worker --loglevel=info --concurrency=2
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend.celery_app inspect ping --timeout 10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ─── Celery Beat (schedules tasks) ───
  celery-beat:
    image: ghcr.io/aclarkson2013/boz-weather-trader-backend:latest
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
    labels:
      - "com.centurylinklabs.watchtower.scope=boz-weather-trader"
    env_file: .env.docker
    depends_on:
      - redis
    entrypoint: []
    command: celery -A backend.celery_app beat --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import redis; r=redis.from_url('redis://redis:6379/1'); r.ping()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Next.js Frontend (PWA) ───
  frontend:
    image: ghcr.io/aclarkson2013/boz-weather-trader-frontend:latest
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
    labels:
      - "com.centurylinklabs.watchtower.scope=boz-weather-trader"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  # ─── Self-Update Sidecar ───
  updater:
    image: ghcr.io/aclarkson2013/boz-weather-trader-updater:latest
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
    labels:
      - "com.centurylinklabs.watchtower.scope=boz-weather-trader"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project
    environment:
      UPDATER_SECRET: ${UPDATER_SECRET:-changeme}
      COMPOSE_PROJECT_DIR: /project

  # ─── Watchtower (Auto-Pull New Images) ───
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Check for new images every 5 minutes
      WATCHTOWER_POLL_INTERVAL: 300
      # Only update containers in this compose project
      WATCHTOWER_SCOPE: boz-weather-trader
      # Clean up old images after updating
      WATCHTOWER_CLEANUP: "true"
      # Include stopped containers
      WATCHTOWER_INCLUDE_STOPPED: "false"
    labels:
      - "com.centurylinklabs.watchtower.scope=boz-weather-trader"

  # ─── Alertmanager (Alert Routing & Delivery) ───
  alertmanager:
    image: prom/alertmanager:latest
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  # ─── Prometheus (Metrics Scraper & Store) ───
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - promdata:/prometheus
    depends_on:
      backend:
        condition: service_healthy
      alertmanager:
        condition: service_started

  # ─── Grafana (Dashboards & Visualization) ───
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  promdata:
  grafanadata:
